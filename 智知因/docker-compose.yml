# 智知因 - Docker Compose 编排文件
version: '3.8'

services:
  # 后端 API 服务
  api:
    build: .
    container_name: zhizhiyin-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Streamlit 服务
  frontend:
    build: .
    container_name: zhizhiyin-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: zhizhiyin-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    profiles:
      - production

networks:
  default:
    name: zhizhiyin-network
